[build]
dockerfile = "Dockerfile.railway"

[deploy]
healthcheckPath = "/api/system/health"
healthcheckTimeout = 60

[[services]]
http_checks = []
internal_port = 80
protocol = "tcp"

[[services.ports]]
force_https = true
handlers = ["http"]
port = 80

[[services.ports]]
handlers = ["tls", "http"]
port = 443
